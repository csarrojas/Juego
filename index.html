<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MathMaster Pro - El Despertar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Audiowide&family=Orbitron:wght@400;700&family=Rajdhani:wght@300;700&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000; color: white;
            font-family: 'Orbitron', sans-serif;
            touch-action: manipulation;
        }

        /* OVERLAY OBLIGATORIO PARA AUDIO Y FULLSCREEN */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 50000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; text-align: center;
        }

        .page {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; 
            background-position: center;
            background-repeat: no-repeat;
            display: none; flex-direction: column; align-items: center;
            transition: opacity 0.5s ease;
            box-sizing: border-box;
            overflow-y: auto; /* Permite scroll vertical si el contenido no cabe en horizontal */
        }

        .active-page { display: flex; }

        /* AJUSTES RESPONSIVOS PARA MÓVIL HORIZONTAL */
        #portada { background-image: url('portada.jpg'); justify-content: flex-end; padding-bottom: 5vh; }
        
        .contenedor-principal-equipo {
            display: flex; width: 95%; max-width: 1150px; gap: 15px; 
            justify-content: center; align-items: stretch; margin-top: 2vh;
            flex-wrap: wrap; 
        }

        .equipo-slot { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            background: rgba(255, 255, 255, 0.05); border: 1px solid #444; 
            border-radius: 12px; padding: 10px; min-width: 80px;
        }

        .equipo-icono { width: 60px; height: 60px; object-fit: contain; }

        .btn-neon { 
            background: rgba(0, 255, 255, 0.1); border: 2px solid #00ffff; color: #00ffff; 
            padding: 8px 20px; font-size: 13px; text-transform: uppercase; cursor: pointer; 
            border-radius: 5px; box-shadow: 0 0 10px #00ffff; transition: 0.4s; 
            font-family: 'Orbitron', sans-serif;
        }

        /* TIENDA OPTIMIZADA */
        .contenedor-tienda-mascotas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px; width: 90%; margin-top: 20px; padding-bottom: 80px;
        }

        .celda-mascota {
            background: rgba(0, 255, 255, 0.05); border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 10px; padding: 8px; text-align: center;
        }

        /* MODAL RESPONSIVO */
        #modal-detalle {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 60000; justify-content: center; align-items: center;
            overflow-y: auto; padding: 20px;
        }

        .modal-contenido {
            background: #0a0a0a; border: 2px solid #00ffff; border-radius: 15px; 
            width: 90%; max-width: 700px; display: flex; flex-direction: row;
            padding: 20px; position: relative; gap: 20px; flex-wrap: wrap;
        }

        .modal-izquierda { flex: 1; display: flex; justify-content: center; min-width: 150px; }
        .modal-derecha { flex: 2; min-width: 200px; }
        .img-grande { width: 120px; height: auto; object-fit: contain; }

        /* PREGUNTAS */
        .contenedor-pregunta-master {
            display: flex; align-items: center; gap: 20px; 
            background: rgba(0,0,0,0.85); border: 2px solid #00ffff; 
            border-radius: 20px; padding: 15px; width: 95%; max-width: 850px;
            flex-wrap: wrap;
        }

        .bar-bg { width: 100%; height: 10px; background: rgba(255, 255, 255, 0.1); border-radius: 5px; border: 1px solid #444; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: width 1.5s ease; }
    </style>
</head>
<body>

    <audio id="musica" loop><source src="musica_epica.mp3" type="audio/mpeg"></audio>
    <audio id="espada"><source src="choque_espada.mp3" type="audio/mpeg"></audio>

    <div id="overlay">
        <h2 style="color:#00ffff; font-size: 2rem; letter-spacing: 5px;">MATHMASTER</h2>
        <p style="color:#00ffff; font-family:'Rajdhani';">TOCA PARA ACTIVAR MAXIMIZAR Y AUDIO</p>
    </div>

    <div id="portada" class="page active-page">
        <button class="btn-neon" id="btnIniciarTodo">INICIAR</button>
    </div>

    <div id="eleccion" class="page" style="background-image: url('eleccion.jpg'); justify-content: center;">
        <div style="display: flex; gap: 5vw;">
            <div id="selPaladin" style="width: 150px; height: 300px; cursor: pointer; border: 1px solid #00ffff;"></div>
            <div id="selHechicera" style="width: 150px; height: 300px; cursor: pointer; border: 1px solid #ff00ff;"></div>
        </div>
    </div>

    <div id="detalles" class="page" style="padding-top: 40px;">
        <button class="btn-neon" style="position:fixed; top:10px; left:10px;" onclick="nav('eleccion')">VOLVER</button>
        <h1 id="txtTitulo" style="font-size: 1.5rem; color: #00ffff;">HÉROE</h1>
        
        <div id="registroContenedor" style="margin: 20px 0; display: flex; gap: 10px;">
            <input type="text" id="nombreHeroe" placeholder="NOMBRE..." style="background:#000; color:white; border:1px solid #00ffff; padding:10px;">
            <button class="btn-neon" id="btnConfirmar">OK</button>
        </div>

        <div id="mejorasContenedor" style="display: none; gap: 10px; flex-wrap: wrap; justify-content: center;">
            <button class="btn-neon" onclick="prepararCiudad()">SIGUIENTE CIUDAD</button>
            <button class="btn-neon" onclick="nav('tienda')">TIENDA</button>
            <button class="btn-neon" onclick="nav('portada')">SALIR</button>
        </div>
    </div>

    <div id="estadoHeroe" class="page" style="background-image: url('portada.jpg');">
        <h1 id="nombreFinal" style="color: #00ffff; text-shadow: 0 0 15px #00ffff;">NOMBRE</h1>
        <div class="contenedor-principal-equipo">
            <div style="flex: 1; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px;">
                <div style="display: flex; justify-content: space-around;">
                    <div class="equipo-slot"><img src="" id="imgArmaFinal" class="equipo-icono"></div>
                    <div class="equipo-slot"><img src="" id="imgEscudoFinal" class="equipo-icono"></div>
                    <div class="equipo-slot"><img src="" id="imgPechoFinal" class="equipo-icono"></div>
                </div>
            </div>
        </div>
        <button class="btn-neon" id="btnIniciarMision" style="margin-top: 20px;">INICIAR MISIÓN</button>
    </div>

    <div id="introduccion" class="page">
        <div class="intro-text-container" id="introTextCont" style="font-family:'Rajdhani'; font-size: 1.5rem; padding: 20px; text-align: center;"></div>
        <button class="btn-neon" id="skipIntro">SALTAR >></button>
    </div>

    <div id="ciudad-intro" class="page">
        <h1 id="tituloCiudadLabel" style="color: #00ffff; margin-top: 20px;">CIUDAD 1</h1>
        <div class="intro-text-container" id="ciudadTextCont" style="font-family:'Rajdhani'; font-size: 1.5rem; padding: 20px; text-align: center;"></div>
        <button class="btn-neon" id="btnContinuarCiudad">INICIAR PRUEBA</button>
    </div>

    <div id="preguntas" class="page">
        <div class="contenedor-pregunta-master">
            <div id="incognita" style="font-size: 50px; color: #00ffff; width: 100px; text-align: center;">?</div>
            <div style="flex: 1;">
                <div id="enunciadoPregunta" style="font-size: 1.1rem; margin-bottom: 10px;"></div>
                <div id="contenedorOpciones" style="display: grid; grid-template-columns: 1fr; gap: 8px;"></div>
            </div>
        </div>
    </div>

    <div id="tienda" class="page" style="background: #000; padding-top: 60px;">
        <button class="btn-neon" style="position:fixed; top:10px; left:10px;" onclick="nav('detalles')">VOLVER</button>
        <h1 style="color: #ffcc00; font-size: 1.2rem;">MERCADO</h1>
        <div class="contenedor-tienda-mascotas">
            <div class="celda-mascota" onclick="verDetalle('mascota_1.png', 'PERRO', 'Veloz y leal.')"><img src="mascota_1.png" class="img-mascota-tienda"><br><button class="btn-neon">50 ORO</button></div>
            <div class="celda-mascota" onclick="verDetalle('mascota_2.png', 'LOBO', 'Visión nocturna.')"><img src="mascota_2.png" class="img-mascota-tienda"><br><button class="btn-neon">50 ORO</button></div>
            <div class="celda-mascota" onclick="verDetalle('arma_2.png', 'BASTÓN', 'Poder puro.')"><img src="arma_2.png" class="img-mascota-tienda"><br><button class="btn-neon">40 ORO</button></div>
            <div class="celda-mascota" onclick="verDetalle('escudo_2.png', 'MURALLA', 'Defensa total.')"><img src="escudo_2.png" class="img-mascota-tienda"><br><button class="btn-neon">40 ORO</button></div>
            <div class="celda-mascota" onclick="verDetalle('traje_1.png', 'TÚNICA', 'Estatus alto.')"><img src="traje_1.png" class="img-mascota-tienda"><br><button class="btn-neon">60 ORO</button></div>
        </div>

        <div id="modal-detalle">
            <div class="modal-contenido">
                <span style="position:absolute; top:10px; right:20px; color:red; cursor:pointer;" onclick="cerrarDetalle()">X</span>
                <div class="modal-izquierda"><img id="modal-img" src="" class="img-grande"></div>
                <div class="modal-derecha">
                    <h2 id="modal-nombre" style="color:#ffcc00; margin:0;">NOMBRE</h2>
                    <p id="modal-desc">Descripción...</p>
                    <button class="btn-neon">ADQUIRIR</button>
                    <button class="btn-neon" onclick="cerrarDetalle()">CERRAR</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const audioMusica = document.getElementById('musica');
        const audioEspada = document.getElementById('espada');
        let heroeSelec = "";
        let ciudadAct = 1;
        let oro = 0;

        // BANCOS DE PREGUNTAS COMPLETOS
        const bancos = {
            1: [
                { q: "¿Quién es el padre de la Geometría?", a: ["Euclides", "Pitágoras", "Tales", "Platón"], c: 0 },
                { q: "¿Qué elemento no tiene dimensiones?", a: ["Plano", "Recta", "Punto", "Segmento"], c: 2 },
                { q: "¿Rectas que nunca se cruzan?", a: ["Secantes", "Paralelas", "Perpendiculares", "Oblicuas"], c: 1 }
            ],
            2: [
                { q: "¿Triángulo con un ángulo > 90°?", a: ["Acutángulo", "Obtusángulo", "Rectángulo", "Equilátero"], c: 1 },
                { q: "¿Línea al punto medio del lado opuesto?", a: ["Altura", "Mediana", "Bisectriz", "Mediatriz"], c: 1 }
            ],
            3: [
                { q: "¿Suma de ángulos externos de un polígono?", a: ["180°", "270°", "360°", "540°"], c: 2 },
                { q: "¿Polígono de 5 lados?", a: ["Hexágono", "Heptágono", "Pentágono", "Octágono"], c: 2 }
            ],
            4: [
                { q: "¿Segmento del centro a la orilla?", a: ["Cuerda", "Diámetro", "Radio", "Arco"], c: 2 },
                { q: "¿Cuerda de mayor longitud?", a: ["Radio", "Diámetro", "Secante", "Tangente"], c: 1 }
            ]
        };

        const intros = {
            1: "Bienvenido a la Ciudad de los Ángulos. Aquí los pilares se sostienen por el orden de Euclides.",
            2: "Ciudad de los Triángulos. Tres puntas que guardan secretos milenarios.",
            3: "Ciudad de los Polígonos. Las formas se vuelven complejas y peligrosas.",
            4: "Ciudad del Círculo. El final del viaje, donde todo vuelve a empezar."
        };

        const db = {
            paladin: { titulo: "PALADÍN", fondo: "cara_paladin.jpg", a: "espada_paladin.png", e: "escudo_paladin.png", p: "pechera_paladin.png" },
            hechicera: { titulo: "HECHICERA", fondo: "cara_hechicera.jpg", a: "baston_hechicera.png", e: "amuleto_hechicera.png", p: "tunica_hechicera.png" }
        };

        // LÓGICA DE MAXIMIZAR Y AUDIO
        document.getElementById('overlay').onclick = function() {
            this.style.display = 'none';
            audioMusica.play().catch(e => console.log("Audio bloqueado"));
            
            // Función para maximizar
            const doc = document.documentElement;
            if (doc.requestFullscreen) doc.requestFullscreen();
            else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
            else if (doc.msRequestFullscreen) doc.msRequestFullscreen();
        };

        document.getElementById('btnIniciarTodo').onclick = () => nav('eleccion');

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
            sfx();
        }

        function sfx() { audioEspada.currentTime = 0; audioEspada.play(); }

        document.getElementById('selPaladin').onclick = () => setup('paladin');
        document.getElementById('selHechicera').onclick = () => setup('hechicera');

        function setup(key) {
            heroeSelec = key;
            document.getElementById('txtTitulo').innerText = db[key].titulo;
            document.getElementById('detalles').style.backgroundImage = `url('${db[key].fondo}')`;
            nav('detalles');
        }

        document.getElementById('btnConfirmar').onclick = () => {
            const n = document.getElementById('nombreHeroe').value;
            if(!n) return;
            document.getElementById('nombreFinal').innerText = n.toUpperCase();
            document.getElementById('imgArmaFinal').src = db[heroeSelec].a;
            document.getElementById('imgEscudoFinal').src = db[heroeSelec].e;
            document.getElementById('imgPechoFinal').src = db[heroeSelec].p;
            nav('estadoHeroe');
        };

        document.getElementById('btnIniciarMision').onclick = () => {
            nav('introduccion');
            escribirTexto("introTextCont", "El despertar ha comenzado. Debes recorrer las ciudades para recuperar el conocimiento perdido.");
        };

        function prepararCiudad() {
            nav('ciudad-intro');
            document.getElementById('tituloCiudadLabel').innerText = "CIUDAD " + ciudadAct;
            escribirTexto("ciudadTextCont", intros[ciudadAct]);
        }

        document.getElementById('btnContinuarCiudad').onclick = () => iniciarQuiz();

        function iniciarQuiz() {
            nav('preguntas');
            const lista = bancos[ciudadAct];
            const p = lista[Math.floor(Math.random()*lista.length)];
            document.getElementById('enunciadoPregunta').innerText = p.q;
            const cont = document.getElementById('contenedorOpciones');
            cont.innerHTML = "";
            p.a.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = 'btn-neon';
                b.innerText = opt;
                b.onclick = () => {
                    if(i === p.c) { ciudadAct++; oro += 50; nav('detalles'); document.getElementById('mejorasContenedor').style.display='flex'; }
                    else { alert("Incorrecto"); nav('detalles'); }
                };
                cont.appendChild(b);
            });
        }

        function escribirTexto(id, texto) {
            const el = document.getElementById(id); el.innerText = "";
            let i = 0;
            const t = setInterval(() => {
                el.innerText += texto[i]; i++;
                if(i >= texto.length) clearInterval(t);
            }, 50);
        }

        function verDetalle(img, nom, desc) {
            document.getElementById('modal-img').src = img;
            document.getElementById('modal-nombre').innerText = nom;
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('modal-detalle').style.display = 'flex';
        }

        function cerrarDetalle() { document.getElementById('modal-detalle').style.display = 'none'; }
        document.getElementById('skipIntro').onclick = () => prepararCiudad();

    </script>
</body>
</html>
