<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MathMaster Pro - El Despertar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Audiowide&family=Orbitron:wght@400;700&family=Rajdhani:wght@300;700&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000; color: white;
            font-family: 'Orbitron', sans-serif;
        }

        .page {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; 
            background-position: center;
            background-repeat: no-repeat;
            display: none; flex-direction: column; align-items: center;
            transition: opacity 0.5s ease;
            overflow-y: auto; /* Permite scroll si el contenido excede el alto del cel */
            box-sizing: border-box;
        }

        .active-page { display: flex; }

        #portada { background-image: url('portada.jpg'); justify-content: flex-end; padding-bottom: 5vh; }
        #eleccion { background-image: url('eleccion.jpg'); justify-content: center; }
        #detalles { background-image: url('cara_paladin.jpg'); justify-content: flex-start; align-items: center; padding-top: 60px; }
        
        #estadoHeroe { 
            background-image: url('portada.jpg'); 
            justify-content: flex-start; 
            padding-top: 2vh; 
        }

        #nombreFinal {
            font-size: 5vh; 
            color: #fff; 
            text-shadow: 0 0 20px #00ffff; 
            text-align: center; 
            margin: 10px 0;
        }
        
        .contenedor-principal-equipo {
            display: flex; width: 95%; max-width: 1150px; gap: 15px; 
            justify-content: center; align-items: stretch; 
            margin-top: 2vh;
            flex-wrap: wrap; /* Ajuste para pantallas pequeñas */
        }

        .equipo-container { display: flex; justify-content: space-around; gap: 10px; margin-top: 5px; }
        
        .equipo-slot { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            background: rgba(255, 255, 255, 0.05); border: 1px solid #444; 
            border-radius: 12px; padding: 10px; transition: 0.4s; position: relative;
            cursor: pointer;
        }

        .equipo-slot:hover {
            background: rgba(0, 255, 255, 0.15);
            border-color: #00ffff;
            box-shadow: 0 0 20px #00ffff;
        }

        .equipo-icono { 
            width: 80px; height: 80px; object-fit: contain; 
            filter: drop-shadow(0 0 10px #00ffff);
        }

        .carrusel-bloqueado { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 8px; 
            margin-top: 15px; 
            width: 100%; 
            justify-items: center; 
        }
        .slot-bloqueado {
            width: 45px; height: 45px; 
            background: rgba(40, 40, 40, 0.8); 
            border: 1px solid #333; 
            border-radius: 8px;
            display: flex; justify-content: center; align-items: center; 
            position: relative; overflow: hidden;
        }
        .slot-bloqueado img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }

        #btnIniciarMision { margin: 20px 0; padding: 12px 35px; font-size: 14px; }

        #introduccion, #ciudad-intro { justify-content: flex-start; align-items: flex-start; padding-left: 5vw; padding-top: 10vh; }

        .intro-text-container {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700; font-size: 3.5vh; line-height: 1.2;
            color: rgba(255, 255, 255, 0.95); max-width: 90%;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.9);
            min-height: 20vh; text-align: left;
            z-index: 5;
        }

        .bar-bg { width: 100%; height: 10px; background: rgba(255, 255, 255, 0.1); border-radius: 5px; border: 1px solid #444; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: width 1.5s ease; }
        
        .btn-neon { 
            background: rgba(0, 255, 255, 0.1); border: 2px solid #00ffff; color: #00ffff; 
            padding: 8px 20px; font-size: 14px; text-transform: uppercase; cursor: pointer; 
            border-radius: 5px; box-shadow: 0 0 10px #00ffff; transition: 0.4s; 
            font-family: 'Orbitron', sans-serif;
        }
        .btn-neon:hover { background: #00ffff; color: #000; }
        
        .btn-back { position: fixed; top: 15px; left: 15px; padding: 5px 12px; font-size: 11px; z-index: 100; }
        .btn-exit { position: fixed; top: 15px; right: 15px; padding: 5px 12px; font-size: 11px; border-color: #ff4400; color: #ff4400; z-index: 100;}
        
        #preguntas { justify-content: center; padding: 20px; }
        .contenedor-pregunta-master {
            display: flex; align-items: center; gap: 20px; 
            background: rgba(0,0,0,0.85); border: 2px solid #00ffff; 
            border-radius: 20px; padding: 20px; width: 95%; max-width: 900px;
        }

        .incognita-container {
            width: 150px; height: 150px; flex-shrink: 0;
            display: flex; justify-content: center; align-items: center;
            border: 2px solid rgba(0, 255, 255, 0.3); border-radius: 50%;
        }

        .layout-mejoras {
            display: flex; width: 100%; justify-content: center; 
            align-items: flex-start; gap: 20px; padding: 20px; flex-wrap: wrap;
        }

        .panel-lateral {
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 12px; padding: 15px; width: 280px;
        }

        /* TIENDA RESPONSIVA */
        .contenedor-tienda-mascotas {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px; width: 95%; margin-top: 20px; padding-bottom: 50px;
        }

        .celda-mascota {
            background: rgba(0, 255, 255, 0.05); border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 10px; padding: 10px; text-align: center;
        }

        .img-mascota-tienda { width: 70px; height: 70px; object-fit: contain; }

        /* MODAL CORREGIDO PARA MÓVIL */
        #modal-detalle {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 11000; justify-content: center; align-items: center;
            overflow-y: auto; padding: 20px; box-sizing: border-box;
        }

        .modal-contenido {
            background: #0a0a0a; border: 2px solid #00ffff; border-radius: 15px; 
            width: 95%; max-width: 800px; display: flex; flex-direction: row;
            padding: 20px; position: relative; gap: 20px;
        }

        @media (max-height: 500px) {
            .modal-contenido { flex-direction: row; padding: 10px; align-items: center; }
            .img-grande { width: 180px !important; height: 180px !important; }
            .texto-descripcion { font-size: 1.1rem !important; }
            .incognita-container { width: 100px; height: 100px; }
            #incognita { font-size: 60px !important; }
        }

        @media (max-width: 700px) {
            .modal-contenido { flex-direction: column; align-items: center; text-align: center; }
            .modal-derecha { padding-left: 0; }
        }

        .img-grande { width: 100%; max-width: 300px; height: auto; object-fit: contain; }
        .texto-descripcion { font-family: 'Rajdhani'; font-size: 1.3rem; color: #00ffff; }
        .cerrar-modal { position: absolute; top: 10px; right: 15px; font-size: 1.5rem; color: #ff4400; cursor: pointer; z-index: 12000; }

        #error-anuncio {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); color: #ff0000; text-shadow: 0 0 20px #ff0000;
            font-size: 5rem; font-weight: 800; z-index: 10000;
        }

        #superado-anuncio {
            display: none; position: fixed; bottom: 2vh; left: 0;
            width: 100%; background: rgba(0, 255, 0, 0.1); padding: 15px 0;
            color: #00ff00; font-size: 2rem; text-align: center; z-index: 10000;
            border-top: 2px solid #00ff00;
        }
        
        .titulo-ciudad {
            color: #00ffff; font-size: 3rem; text-shadow: 0 0 20px #00ffff;
            position: absolute; top: 10px; width: 100%; text-align: center;
        }
    </style>
</head>
<body>

    <audio id="musica" loop><source src="musica_epica.mp3" type="audio/mpeg"></audio>
    <audio id="espada"><source src="choque_espada.mp3" type="audio/mpeg"></audio>

    <div id="error-anuncio">ERROR</div>
    <div id="superado-anuncio">CONOCIMIENTO DESCARGADO</div>

    <div id="overlay">
        <h2 style="color:#00ffff; text-align:center; font-size: 2rem; letter-spacing: 5px;">BIENVENIDO</h2>
        <div style="font-family: 'Rajdhani', sans-serif; color: #00ffff;">Haz clic para entrar</div>
    </div>

    <div id="portada" class="page active-page">
        <button class="btn-neon" id="btnGoEleccion">INICIAR</button>
    </div>

    <div id="eleccion" class="page">
        <button class="btn-neon btn-back" onclick="nav('portada')">SALIR</button>
        <div style="display: flex; gap: 5vw; margin-top: 5vh;">
            <div style="width: 180px; height: 350px; cursor: pointer; background: rgba(0,255,255,0.1); border: 1px solid #00ffff; border-radius: 15px;" id="selPaladin"></div>
            <div style="width: 180px; height: 350px; cursor: pointer; background: rgba(255,0,255,0.1); border: 1px solid #ff00ff; border-radius: 15px;" id="selHechicera"></div>
        </div>
    </div>

    <div id="detalles" class="page">
        <button class="btn-neon btn-back" id="btnBackDetalles" onclick="nav('eleccion')">VOLVER</button>
        <h1 style="font-family: 'Audiowide'; font-size: 4vh; color: #00ffff; position: absolute; top: 10px;" id="txtTitulo">CARGANDO...</h1>

        <div class="layout-mejoras">
            <div class="panel-lateral">
                <h3 style="color: #00ffff; font-size: 0.9rem; text-align: center;">ATRIBUTOS</h3>
                <div id="statsBarrasContenedor"></div>
            </div>

            <div id="creditosPanelDerecho" class="panel-lateral" style="display: none;">
                <h3 style="color: #00ffff; font-size: 0.9rem; text-align: center;">MONEDAS</h3>
                <div style="font-size: 0.9rem;">
                    <div class="oro">Oro: <span id="oroVal">0</span></div>
                    <div class="plata">Plata: <span id="plataVal">0</span></div>
                    <div class="bronce">Bronce: <span id="bronceVal">0</span></div>
                </div>
            </div>
        </div>
        
        <div id="registroContenedor" style="margin: 20px 0; display: flex; gap: 10px;">
            <input type="text" id="nombreHeroe" style="background: #000; border: 1px solid #00ffff; color: white; padding: 8px; width: 180px;" placeholder="NOMBRE..." maxlength="12">
            <button class="btn-neon" id="btnConfirmar">OK</button>
        </div>

        <div id="mejorasContenedor" style="display: none; padding: 20px; gap: 10px; flex-wrap: wrap; justify-content: center;">
            <button class="btn-neon" onclick="prepararCiudad()" style="border-color: #00ff00; color: #00ff00;">SIGUIENTE CIUDAD</button>
            <button class="btn-neon" onclick="nav('tienda')" style="border-color: #ffcc00; color: #ffcc00;">TIENDA</button> 
            <button class="btn-neon" onclick="nav('portada')" style="border-color: #ff4400; color: #ff4400;">SALIR</button>
        </div>
    </div>

    <div id="estadoHeroe" class="page">
        <button class="btn-neon btn-exit" onclick="nav('portada')">SALIR</button>
        <h1 id="nombreFinal">NOMBRE</h1>
        <div class="contenedor-principal-equipo">
            <div style="flex: 1; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; min-width: 300px;">
                <div class="equipo-container">
                    <div class="equipo-slot"><img src="" id="imgArmaFinal" class="equipo-icono"></div>
                    <div class="equipo-slot"><img src="" id="imgEscudoFinal" class="equipo-icono"></div>
                    <div class="equipo-slot"><img src="" id="imgPechoFinal" class="equipo-icono"></div>
                </div>
                <div class="carrusel-bloqueado">
                    <div class="slot-bloqueado"></div><div class="slot-bloqueado"></div><div class="slot-bloqueado"></div><div class="slot-bloqueado"></div><div class="slot-bloqueado"></div>
                </div>
            </div>
            <div style="width: 200px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px;">
                <div style="font-size: 10px;">FUE: <div class="bar-bg"><div id="barFue" class="bar-fill" style="background:#ffaa00;"></div></div></div>
                <div style="font-size: 10px; margin-top:5px;">MAG: <div class="bar-bg"><div id="barMag" class="bar-fill" style="background:#ff00ff;"></div></div></div>
                <div style="font-size: 10px; margin-top:5px;">AGI: <div class="bar-bg"><div id="barAgi" class="bar-fill" style="background:#00ffff;"></div></div></div>
            </div>
        </div>
        <button class="btn-neon" id="btnIniciarMision">INICIAR MISIÓN</button>
    </div>

    <div id="introduccion" class="page">
        <button class="btn-neon" id="skipIntro" style="position: fixed; top: 15px; right: 15px;">SALTAR >></button>
        <div class="intro-text-container typing-cursor" id="introTextCont"></div>
        <div id="btnContinuarCont" style="opacity:0; margin-top: 20px;"><button class="btn-neon" onclick="prepararCiudad()">EMPEZAR</button></div>
    </div>

    <div id="ciudad-intro" class="page">
        <h1 id="tituloCiudadLabel" class="titulo-ciudad">CIUDAD 1</h1>
        <button class="btn-neon" id="skipCiudadIntro" style="position: fixed; top: 15px; right: 15px;">SALTAR >></button>
        <div class="intro-text-container typing-cursor" id="ciudadTextCont"></div>
        <div id="btnContinuarCiudad" style="opacity:0; margin-top: 20px;"><button class="btn-neon" onclick="iniciarQuiz()">INICIAR PRUEBA</button></div>
    </div>

    <div id="preguntas" class="page">
        <div class="contenedor-pregunta-master">
            <div id="boxIncognita" class="incognita-container">
                <div id="incognita" style="font-size: 80px; color: #00ffff;">?</div>
            </div>
            <div style="flex: 1;">
                <div id="enunciadoPregunta" style="font-size: 1.2rem; margin-bottom: 15px; font-family: 'Rajdhani'; font-weight: 700;"></div>
                <div id="contenedorOpciones" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
            </div>
        </div>
    </div>

    <div id="tienda" class="page" style="background: #000; padding-top: 60px;">
        <button class="btn-neon btn-back" onclick="nav('detalles')">VOLVER</button>
        <h1 style="color: #ffcc00; font-size: 1.5rem;">TIENDA DE MASCOTAS</h1>
        <div class="contenedor-tienda-mascotas">
            <div class="celda-mascota" onclick="verDetalle('mascota_1.png', 'PERRO DE CAZA', 'Bestia de guerra con mandíbula firme.')"><img src="mascota_1.png" class="img-mascota-tienda"><button class="btn-neon" style="font-size: 9px; border-color:#ffcc00; margin-top:5px;">50 ORO</button></div>
            <div class="celda-mascota" onclick="verDetalle('mascota_2.png', 'LOBO SALVAJE', 'Visión aguda para detectar respuestas.')"><img src="mascota_2.png" class="img-mascota-tienda"><button class="btn-neon" style="font-size: 9px; border-color:#ffcc00; margin-top:5px;">50 ORO</button></div>
            <div class="celda-mascota" onclick="verDetalle('mascota_3.png', 'OSO GRIS', 'Fuerza bruta para resistir ataques.')"><img src="mascota_3.png" class="img-mascota-tienda"><button class="btn-neon" style="font-size: 9px; border-color:#ffcc00; margin-top:5px;">50 ORO</button></div>
            <div class="celda-mascota" onclick="verDetalle('mascota_4.png', 'AGUILA', 'El aliado definitivo del conocimiento.')"><img src="mascota_4.png" class="img-mascota-tienda"><button class="btn-neon" style="font-size: 9px; border-color:#ffcc00; margin-top:5px;">50 ORO</button></div>
            <div class="celda-mascota" onclick="verDetalle('mascota_5.png', 'GATO', 'Poder para hechizos geométricos.')"><img src="mascota_5.png" class="img-mascota-tienda"><button class="btn-neon" style="font-size: 9px; border-color:#ffcc00; margin-top:5px;">50 ORO</button></div>
        </div>

        <div id="modal-detalle">
            <div class="modal-contenido">
                <span class="cerrar-modal" onclick="cerrarDetalle()">X</span>
                <div class="modal-izquierda">
                    <img id="modal-img" src="" class="img-grande">
                </div>
                <div class="modal-derecha">
                    <h2 id="modal-nombre" style="font-family: 'Audiowide'; color: #ffcc00; margin: 0 0 10px 0; font-size: 1.2rem;">NOMBRE</h2>
                    <p id="modal-desc" class="texto-descripcion">Descripción...</p>
                    <button class="btn-neon" style="margin-top: 15px;">ADQUIRIR</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // MANTENER TODA TU LÓGICA DE JAVASCRIPT IGUAL
        // SOLO ASEGÚRATE DE QUE LAS FUNCIONES nav, verDetalle y cerrarDetalle SIGAN AHÍ.
        const sndEspada = document.getElementById('espada');
        const musica = document.getElementById('musica');
        let heroeSeleccionado = "";
        let introTimers = [];
        let aciertosCount = 0;
        let ciudadActual = 1;
        let oroActual = 0; let plataActual = 0; let bronceActual = 0;
        let preguntasCiudad = [];
        let statsActuales = { fue: 0, mag: 0, agi: 0 };
        
        const VELOCIDAD_TIPEADO = 50; 
        const ESPERA_ENTRE_LINEAS = 2000; 
        const ACIERTOS_PARA_GANAR = 7;
        const MAX_CIUDADES = 4;

        const bancos = {
            ciudad1: [
                { q: "¿Quién es el padre de la Geometría?", a: ["Euclides", "Pitágoras", "Tales", "Platón"], c: 0 },
                { q: "¿Qué elemento no tiene dimensiones?", a: ["Plano", "Recta", "Punto", "Segmento"], c: 2 },
                { q: "¿Rectas que nunca se cruzan?", a: ["Secantes", "Paralelas", "Perpendiculares", "Oblicuas"], c: 1 },
                { q: "¿Dimensiones de un plano?", a: ["Una", "Dos", "Tres", "Cero"], c: 1 }
            ],
            ciudad2: [
                { q: "¿Triángulo con un ángulo > 90°?", a: ["Acutángulo", "Obtusángulo", "Rectángulo", "Equilátero"], c: 1 },
                { q: "¿Línea al punto medio del lado opuesto?", a: ["Altura", "Mediana", "Bisectriz", "Mediatriz"], c: 1 }
            ],
            ciudad3: [
		        { q: "¿Suma de ángulos ext. de un polígono?", a: ["180°", "270°", "360°", "540°"], c: 2 },
                { q: "¿Polígono de 5 lados?", a: ["Hexágono", "Heptágono", "Pentágono", "Octágono"], c: 2 }
            ],
            ciudad4: [
                { q: "¿Segmento del centro a la orilla?", a: ["Cuerda", "Diámetro", "Radio", "Arco"], c: 2 },
                { q: "¿Cuerda de mayor longitud?", a: ["Radio", "Diámetro", "Secante", "Tangente"], c: 1 }
            ]
        };

        const db = {
            paladin: { equipo: { imgA: "espada_paladin.png", imgE: "escudo_paladin.png", imgP: "pechera_paladin.png" }, stats: { fue: 20, mag: 15, agi: 15 }, titulo: "PALADÍN", fondo: "cara_paladin.jpg", introImg: "guerrero_horizonte.png" },
            hechicera: { equipo: { imgA: "baston_hechicera.png", imgE: "amuleto_hechicera.png", imgP: "tunica_hechicera.png" }, stats: { fue: 15, mag: 20, agi: 15 }, titulo: "HECHICERA", fondo: "cara_hechicera.jpg", introImg: "hechicera_horizonte.png" }
        };

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => { p.style.display = 'none'; p.classList.remove('active-page'); });
            const target = document.getElementById(id);
            if(target){ target.style.display = 'flex'; target.classList.add('active-page'); }
            sfx();
        }

        function sfx() { sndEspada.currentTime=0; sndEspada.play(); }

        document.getElementById('overlay').onclick = () => { 
            musica.play().catch(e => {}); 
            document.getElementById('overlay').style.display='none'; 
        };

        document.getElementById('btnGoEleccion').onclick = () => { nav('eleccion'); }

        function setDetalles(key, modoMejora = false) {
            heroeSeleccionado = key;
            const p = db[key];
            if(!modoMejora) {
                statsActuales = {...p.stats};
                document.getElementById('registroContenedor').style.display = 'flex';
                document.getElementById('mejorasContenedor').style.display = 'none';
                document.getElementById('creditosPanelDerecho').style.display = 'none';
            } else {
                document.getElementById('registroContenedor').style.display = 'none';
                document.getElementById('mejorasContenedor').style.display = 'flex';
                document.getElementById('creditosPanelDerecho').style.display = 'block';
                document.getElementById('oroVal').innerText = oroActual;
            }
            document.getElementById('detalles').style.backgroundImage = `url('${p.fondo}')`;
            document.getElementById('txtTitulo').innerText = p.titulo;
            const contenedor = document.getElementById('statsBarrasContenedor');
            contenedor.innerHTML = "";
            const statsVisual = [{n:"FUE",p:statsActuales.fue,c:"#ffcc00"}, {n:"MAG",p:statsActuales.mag,c:"#ff00ff"}, {n:"AGI",p:statsActuales.agi,c:"#00ffff"}];
            statsVisual.forEach((carac, i) => {
                contenedor.innerHTML += `<div style="font-size:10px; color:${carac.c}">${carac.n} ${carac.p}%<div class="bar-bg"><div class="bar-fill" id="bfill${i}" style="background:${carac.c}; width:${carac.p}%"></div></div></div>`;
            });
            nav('detalles');
        }

        document.getElementById('selPaladin').onclick = () => setDetalles('paladin');
        document.getElementById('selHechicera').onclick = () => setDetalles('hechicera');
        
        document.getElementById('btnConfirmar').onclick = () => {
            const n = document.getElementById('nombreHeroe').value.trim();
            if (!n) return;
            document.getElementById('nombreFinal').innerText = n.toUpperCase();
            const h = db[heroeSeleccionado];
            document.getElementById('imgArmaFinal').src = h.equipo.imgA;
            document.getElementById('imgEscudoFinal').src = h.equipo.imgE;
            document.getElementById('imgPechoFinal').src = h.equipo.imgP;
            nav('estadoHeroe');
            actualizarBarrasEstado();
        };

        function actualizarBarrasEstado() {
            document.getElementById('barFue').style.width = statsActuales.fue + "%";
            document.getElementById('barMag').style.width = statsActuales.mag + "%";
            document.getElementById('barAgi').style.width = statsActuales.agi + "%";
        }

        document.getElementById('btnIniciarMision').onclick = () => {
            nav('introduccion');
            escribirHistoria();
        };

        async function escribirHistoria() {
            const cont = document.getElementById('introTextCont');
            const lineas = ["AÑO 3141", "La humanidad desaparece...", "Se lucha por el conocimiento.", "Es la única forma de sobrevivir."];
            cont.innerHTML = "";
            for (let j = 0; j < lineas.length; j++) {
                await escribirLinea(cont, lineas[j], j === 0);
            }
            document.getElementById('btnContinuarCont').style.opacity = "1";
        }

        function escribirLinea(elemento, texto, esPrimera) {
            return new Promise(resolve => {
                let i = 0; if (!esPrimera) elemento.innerHTML += "<br>";
                const interval = setInterval(() => {
                    if (i < texto.length) { elemento.innerHTML += texto[i]; i++; } 
                    else { clearInterval(interval); resolve(); }
                }, VELOCIDAD_TIPEADO);
            });
        }

        function prepararCiudad() {
            nav('ciudad-intro');
            document.getElementById('ciudadTextCont').innerHTML = "Entrando a la Ciudad " + ciudadActual + "... El Guardián te espera.";
            document.getElementById('btnContinuarCiudad').style.opacity = "1";
        }

        function iniciarQuiz() {
            aciertosCount = 0;
            preguntasCiudad = [...(bancos[`ciudad${ciudadActual}`] || bancos.ciudad1)].sort(() => Math.random() - 0.5);
            nav('preguntas');
            siguientePregunta();
        }

        function siguientePregunta() {
            if(aciertosCount >= 2) { // Bajado a 2 para pruebas rápidas
                ciudadActual++;
                oroActual += 50;
                setDetalles(heroeSeleccionado, true);
                return;
            }
            const p = preguntasCiudad.pop();
            document.getElementById('enunciadoPregunta').innerText = p.q;
            const contenedor = document.getElementById('contenedorOpciones');
            contenedor.innerHTML = "";
            p.a.forEach((opcion, i) => {
                const btn = document.createElement('button');
                btn.className = 'btn-neon';
                btn.innerText = opcion;
                btn.onclick = () => { if(i===p.c){ aciertosCount++; siguientePregunta(); } else { nav('estadoHeroe'); }};
                contenedor.appendChild(btn);
            });
        }

        function verDetalle(img, nombre, desc) {
            document.getElementById('modal-img').src = img;
            document.getElementById('modal-nombre').innerText = nombre;
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('modal-detalle').style.display = 'flex';
            sfx();
        }

        function cerrarDetalle() {
            document.getElementById('modal-detalle').style.display = 'none';
        }

        document.getElementById('skipIntro').onclick = () => prepararCiudad();
        document.getElementById('skipCiudadIntro').onclick = () => iniciarQuiz();

    </script>
</body>
</html>
