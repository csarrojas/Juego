<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathMaster Pro - El Despertar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Audiowide&family=Orbitron:wght@400;700&family=Rajdhani:wght@300;700&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000; color: white;
            font-family: 'Orbitron', sans-serif;
        }

        .page {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            /* CORRECCIÓN: Volvemos a cover para que la imagen se expanda correctamente */
            background-size: cover; 
            background-position: center;
            background-repeat: no-repeat;
            display: none; flex-direction: column; align-items: center;
            transition: opacity 0.5s ease;
        }

        .active-page { display: flex; }

        #portada { background-image: url('portada.jpg'); justify-content: flex-end; padding-bottom: 5vh; }
        #eleccion { background-image: url('eleccion.jpg'); justify-content: center; }
        #detalles { background-image: url('cara_paladin.jpg'); justify-content: space-between; align-items: center; }
        
        #estadoHeroe { 
            background-image: url('portada.jpg'); 
            justify-content: flex-start; 
            padding-top: 5vh; 
        }

        #nombreFinal {
            font-size: 4vh; 
            color: #fff; 
            text-shadow: 0 0 20px #00ffff; 
            text-align: center; 
            margin-top: 1vh;
            margin-bottom: 2vh;
        }
        
        .contenedor-principal-equipo {
    display: flex !important;
    flex-direction: row !important; /* Mantiene personaje y cuadro lado a lado */
    align-items: flex-end !important; /* Alinea los elementos a la base del contenedor */
    gap: 35px !important;
    
    /* Aumentamos este valor para empujar todo hacia abajo */
    margin-top: 8.5vh !important; 
    
    /* Aseguramos que el contenedor ocupe el resto del alto disponible */
    height: auto !important; 
}

        .equipo-container { display: flex; justify-content: space-around; gap: 15px; margin-top: 5px; }
        
        .equipo-slot { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            background: rgba(255, 255, 255, 0.05); border: 1px solid #444; 
            border-radius: 12px; padding: 15px; transition: 0.4s; position: relative;
            cursor: pointer;
        }

        /* Iluminación Neón intensa restaurada */
        .equipo-slot:hover {
            background: rgba(0, 255, 255, 0.15);
            border-color: #00ffff;
            transform: translateY(-8px);
            box-shadow: 0 0 30px #00ffff, inset 0 0 15px rgba(0, 255, 255, 0.4);
        }

        .equipo-icono {
    width: 100px;
    height: 100px;
    background: rgba(0, 255, 255, 0.1); /* Fondo cian muy suave */
    border: none !important; /* ELIMINA EL MARCO FUCSIA */
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 10px;

    /* AGREGA ESTO PARA EL BRILLO NEÓN ALREDEDOR DEL EQUIPO */
    filter: drop-shadow(0 0 8px #00ffff); 
}

#equipo {
    display: flex !important;
    flex-direction: column !important;
    justify-content: flex-start !important; /* Cambiamos de center a flex-start */
    padding-top: 5vh !important;
}
        .carrusel-bloqueado { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 5px; 
            margin-top: 10px; 
            width: 100%; 
            justify-items: center; 
        }
        

	.slot-bloqueado {
    width: 50px;
    height: 50px;
    border: 1px dashed #555;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(255,255,255,0.05);
}

        .slot-bloqueado img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(0.5) brightness(0.6); opacity: 0.8; }
        .slot-bloqueado::after { content: '🔒'; font-size: 15px; position: absolute; z-index: 2; text-shadow: 0 0 10px black; }

        #btnIniciarMision {
    padding: 6px 18px !important; /* Más pequeño que el original */
    font-size: 0.9rem !important;   /* Letra más compacta */
    margin-top: 5px !important;
    width: auto !important;         /* Para que no sea tan ancho */
    border-width: 1px !important;
    margin-bottom: 10px !important;
}

        #introduccion, #ciudad-intro { justify-content: flex-start; align-items: flex-start; padding-left: 8vw; }
        #introduccion { background-image: url('guerrero_horizonte.png'); padding-top: 5vh; }
        #ciudad-intro { padding-top: 10vh; } 

        .intro-text-container {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700; font-size: 4vh; line-height: 1.4;
            color: rgba(255, 255, 255, 0.75); max-width: 90%;
            text-shadow: 3px 3px 15px rgba(0,0,0,0.9);
	    margin-top: 60px;
            min-height: 25vh; text-align: left;
            z-index: 5;
        }

        .bar-bg { width: 100%; height: 12px; background: rgba(255, 255, 255, 0.1); border-radius: 6px; border: 1px solid #444; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: width 1.5s cubic-bezier(0.1, 1, 0.1, 1); box-shadow: 0 0 10px currentColor; }
        .btn-neon { background: rgba(0, 255, 255, 0.1); border: 2px solid #00ffff; color: #00ffff; padding: 10px 25px; font-size: 16px; text-transform: uppercase; cursor: pointer; border-radius: 5px; box-shadow: 0 0 10px #00ffff; transition: 0.4s; font-family: 'Orbitron', sans-serif; }
        .btn-neon:hover { background: #00ffff; color: #000; box-shadow: 0 0 30px #00ffff; }
        .btn-back { position: absolute; top: 20px; left: 20px; padding: 5px 15px; font-size: 12px; z-index: 10; }
        .btn-exit { position: absolute; top: 20px; right: 20px; padding: 5px 15px; font-size: 12px; border-color: #ff4400; color: #ff4400; box-shadow: 0 0 10px #ff4400; }
        
        #overlay { position: fixed; top: 0; left: 0; z-index: 9999; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(2px); display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }

        .año-resaltado { font-size: 8vh; font-weight: 700; color: #00ffff; text-shadow: 0 0 25px rgba(0, 255, 255, 0.7); display: inline-block; margin-bottom: 15px; }
        .typing-cursor::after { content: '_'; animation: blink 0.8s infinite; color: #00ffff; }
        @keyframes blink { 50% { opacity: 0; } }

        #error-anuncio {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); color: #ff0000; text-shadow: 0 0 30px #ff0000;
            font-size: 10rem; font-weight: 800; z-index: 10000; pointer-events: none;
        }

        #superado-anuncio {
            display: none; position: fixed; bottom: 5vh; left: 0;
            width: 100%; background: rgba(0, 255, 0, 0.1); backdrop-filter: blur(10px);
            padding: 30px 0; color: #00ff00; text-shadow: 0 0 20px #00ff00;
            font-size: 4rem; font-weight: 800; z-index: 10000; pointer-events: none;
            text-align: center; border-top: 2px solid #00ff00; border-bottom: 2px solid #00ff00;
            animation: pulse-download 1s infinite;
        }

        .titulo-ciudad {
            color: #00ffff; font-size: 2.5rem; font-weight: 800;
            text-shadow: 0 0 30px #00ffff; margin: 0; font-family: 'Orbitron';
            position: absolute; top: 40px; left: 0; width: 100%; text-align: center;
            z-index: 1;
        }

        .incognita-container {
            position: relative; width: 280px; height: 280px; 
            display: flex; justify-content: center; align-items: center;
            border: 2px solid rgba(0, 255, 255, 0.3); border-radius: 50%;
            transition: 0.5s; background: rgba(0, 255, 255, 0.05);
        }
        .acierto-pulso { border-color: #00ff00; box-shadow: 0 0 50px #00ff00; animation: pulse-green 1s infinite; }

        .layout-mejoras {
            display: flex; width: 100%; height: 60vh;
            justify-content: space-between; align-items: center;
            padding: 0 10px; box-sizing: border-box;
        }

        .panel-lateral {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 15px; padding: 15px; width: 260px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .contenedor-monedas { display: flex; flex-direction: column; gap: 15px; margin-top: 15px; }
        .fila-moneda { display: flex; align-items: center; gap: 15px; }
        .svg-moneda { width: 45px; height: 45px; filter: drop-shadow(0 0 5px currentColor); flex-shrink: 0; }
        .valor-moneda { font-family: 'Audiowide'; font-size: 1.5rem; white-space: nowrap; }

        .oro { color: #ffcc00; }
        .plata { color: #e0e0e0; }
        .bronce { color: #cd7f32; }

        .stat-valor-texto { font-size: 1rem; margin-bottom: 5px; display: flex; justify-content: space-between; }

#tienda {
    justify-content: flex-start;
    padding-top: 8vh;
}

#tienda .panel-lateral:hover {
    border-color: #ffcc00;
    box-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
    transform: scale(1.02);
    transition: 0.3s;
}

/* ESTILOS PARA LAS CELDAS DE MASCOTAS */
.contenedor-tienda-mascotas {
    display: grid !important;
    /* 5 columnas para que quepan más mascotas a lo ancho */
    grid-template-columns: repeat(5, 1fr) !important; 
    gap: 10px !important;
    padding: 10px !important;
    width: 90% !important;
    /* Altura máxima para que no empuje el contenido fuera */
    max-height: 65vh !important; 
    overflow-y: auto; /* Por si agregas más, que se pueda hacer scroll */
}

.celda-mascota {
    background: rgba(0, 255, 255, 0.05);
    border: 1px solid rgba(0, 255, 255, 0.3);
    border-radius: 8px;
    padding: 5px;
    text-align: center;
    transition: 0.4s;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.celda-mascota:hover {
    background: rgba(0, 255, 255, 0.15);
    border-color: #00ffff;
    transform: translateY(-10px);
    box-shadow: 0 0 30px #00ffff, inset 0 0 15px rgba(0, 255, 255, 0.4);
}

.img-mascota-tienda {
    width: 60px;
    height: 60px;
    object-fit: contain;
    filter: drop-shadow(0 0 10px #00ffff);
    margin-bottom: 15px;
}

/* VENTANA DE DETALLE (MODAL) */
#modal-detalle {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.9); z-index: 11000; justify-content: center; align-items: center;
}

.modal-contenido {
    display: flex !important;
    flex-direction: row !important; /* Imagen a la izquierda, texto/botón a la derecha */
    align-items: center !important;
    justify-content: space-around !important;
    width: 85% !important;
    height: 80vh !important; /* Altura controlada para evitar desbordes */
    padding: 15px !important;
    background: rgba(0, 0, 0, 0.95) !important;
    border: 2px solid #00ffff;
    box-shadow: inset 0 0 20px rgba(0, 255, 255, 0.2); /* Brillo interno en el cuadro */
    position: relative;
}

.modal-izquierda { flex: 1.5; display: flex; justify-content: center; align-items: center; }
.modal-derecha {
    display: flex !important;
    flex-direction: column !important; /* Título -> Desc -> Botón */
    justify-content: center !important;
    align-items: flex-start !important; /* Alineado a la izquierda del bloque */
    text-align: left !important;
    width: 100%;
}

.modal-derecha .btn-neon {
    align-self: flex-start !important; /* Lo posiciona justo debajo del texto */
    padding: 8px 20px !important;
    font-size: 1rem !important;
}

.img-grande {
    width: 200px !important;
    height: 200px !important;
    object-fit: contain;
    flex-shrink: 0;
    margin-right: 20px;
    
    /* EFECTO NEÓN AQUÍ */
    /* El primer valor es el color, los siguientes son la intensidad del brillo */
    filter: drop-shadow(0 0 10px #00ffff) drop-shadow(0 0 20px rgba(0, 255, 255, 0.5));
    
    /* Animación opcional para que el brillo "pulse" */
    animation: pulsoNeon 2s infinite alternate;
}

.texto-descripcion {
    font-family: 'Rajdhani', sans-serif; font-size: 1.8rem; color: #00ffff;
    text-shadow: 0 0 10px #00ffff; line-height: 1.4;
}

.cerrar-modal {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 28px;
    color: #ff00ff;
    cursor: pointer;
    z-index: 100;
}

#modal-nombre {
    font-size: 1.4rem !important;
    margin: 0 0 10px 0 !important;
    color: #00ffff;
}

#modal-desc {
    font-size: 0.9rem !important;
    margin-bottom: 15px !important;
    line-height: 1.3;
    max-height: 40vh; /* Evita que descripciones largas empujen el botón */
    overflow-y: auto;
}

/* Nueva regla para que el contenedor de preguntas se ajuste al celular */
#preguntas > div {
    height: 80vh !important;       /* Altura fija para que no crezca más */
    max-height: 80vh !important;
    padding: 5px 15px !important;  /* Relleno interno muy pequeño */
    gap: 10px !important;          /* Espacio mínimo entre el '?' y el texto */
    margin-top: 2vh !important;    /* Pegado casi al borde superior */
    overflow: hidden;              /* Evita que cualquier elemento interno lo estire */
}

/* Achica el círculo del signo de interrogación */
.incognita-container {
    width: 110px !important;       /* Ajuste de tamaño intermedio */
    height: 110px !important;
}

#incognita {
    font-size: 60px !important;
}

/* Ajusta el texto de la pregunta para que no sea gigante */
#enunciadoPregunta {
    font-size: 1rem !important;    /* Letra más pequeña para ganar espacio */
    margin-bottom: 5px !important;
    line-height: 1.1;
}

/* Hace que las opciones salgan una debajo de otra en el celular */
#contenedorOpciones {
    gap: 5px !important;           /* Botones más juntos */
}

#contenedorOpciones .btn-neon {
    min-height: 30px !important;   /* Botones más chatos */
    padding: 4px !important;
    font-size: 0.8rem !important;
}

@keyframes pulsoNeon {
    from {
        filter: drop-shadow(0 0 5px #00ffff) drop-shadow(0 0 10px rgba(0, 255, 255, 0.3));
    }
    to {
        filter: drop-shadow(0 0 15px #00ffff) drop-shadow(0 0 30px rgba(0, 255, 255, 0.8));
    }
}

.texto-neon-verde {
    color: #ffffff !important; /* Letra blanca para máxima legibilidad */
    font-weight: 800;
    
    /* El resplandor verde se mantiene alrededor del blanco */
    text-shadow: 
        -1px -1px 0 rgba(80, 80, 80, 0.5),  
         1px -1px 0 rgba(80, 80, 80, 0.5),
        -1px  1px 0 rgba(80, 80, 80, 0.5),
         1px  1px 0 rgba(80, 80, 0.5), 
         0 0 10px #00ff00, /* Primer halo verde */
         0 0 20px #00ff00, /* Segundo halo verde más difuso */
         0 0 30px rgba(0, 255, 0, 0.3); /* Brillo ambiental */
}

.contenedor-oscura-ciudad2 {
    background: rgba(0, 0, 0, 0.6) !important; /* Capa negra traslúcida */
    backdrop-filter: blur(5px); /* Opcional: desenfoca un poco el fondo */
    padding: 20px;
    border-radius: 10px;
    border: 1px solid #00ff00; /* Borde neón para que combine */
}
    </style>
</head>
<body>

    <audio id="musica" loop><source src="musica_epica.mp3" type="audio/mpeg"></audio>
    <audio id="espada"><source src="choque_espada.mp3" type="audio/mpeg"></audio>

    <div id="error-anuncio">ERROR</div>
    <div id="superado-anuncio">CONOCIMIENTO DESCARGADO</div>

    <div id="overlay">
        <h2 style="color:#00ffff; text-align:center; font-size: 3rem; letter-spacing: 5px; margin-bottom: 0;">BIENVENIDO</h2>
        <div style="font-family: 'Rajdhani', sans-serif; font-size: 1.2rem; color: #00ffff; margin-top: 10px; letter-spacing: 3px;">Haz clic para entrar al reino</div>
    </div>

    <div id="portada" class="page active-page">
        <button class="btn-neon" id="btnGoEleccion">INICIAR</button>
    </div>

    <div id="eleccion" class="page">
        <button class="btn-neon btn-back" onclick="nav('portada')">SALIR</button>
        <div style="display: flex; gap: 10vw; margin-top: 10vh;">
            <div style="width: 280px; height: 550px; cursor: pointer;" id="selPaladin"></div>
            <div style="width: 280px; height: 550px; cursor: pointer;" id="selHechicera"></div>
        </div>
    </div>

    <div id="detalles" class="page">
      
        <h1 style="font-family: 'Audiowide'; font-size: 5vh; color: #00ffff; text-shadow: 0 0 15px #00ffff; margin-top: 20px; position: absolute; top: 10px;" id="txtTitulo">Cargando...</h1>

        <div class="layout-mejoras">
            <div id="statsPanelIzquierdo" class="panel-lateral">
                <h3 style="color: #00ffff; margin-top: 0; text-align: center; font-size: 1rem; letter-spacing: 2px;">ATRIBUTOS</h3>
                <div id="statsBarrasContenedor" style="display: flex; flex-direction: column; gap: 20px;"></div>
            </div>

            <div style="flex: 1;"></div>

            <div id="creditosPanelDerecho" class="panel-lateral" style="display: none;">
                <h3 style="color: #00ffff; margin-top: 0; text-align: center; font-size: 1rem; letter-spacing: 2px;">MONEDAS ACUMULADAS</h3>
                <div class="contenedor-monedas">
                    <div class="fila-moneda">
                        <svg class="svg-moneda oro" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="5"/>
                            <text x="50" y="65" font-family="Audiowide" font-size="40" text-anchor="middle" fill="currentColor">G</text>
                        </svg>
                        <span class="valor-moneda oro"><span id="oroVal">0</span> de Oro</span>
                    </div>
                    <div class="fila-moneda">
                        <svg class="svg-moneda plata" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="5"/>
                            <text x="50" y="65" font-family="Audiowide" font-size="40" text-anchor="middle" fill="currentColor">S</text>
                        </svg>
                        <span class="valor-moneda plata"><span id="plataVal">0</span> de Plata</span>
                    </div>
                    <div class="fila-moneda">
                        <svg class="svg-moneda bronce" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="5"/>
                            <text x="50" y="65" font-family="Audiowide" font-size="40" text-anchor="middle" fill="currentColor">B</text>
                        </svg>
                        <span class="valor-moneda bronce"><span id="bronceVal">0</span> de Bronce</span>
                    </div>
                </div>
            </div>
        </div>
        
	<div style="width: 100%; display: flex; justify-content: flex-start; padding-left: 20px; margin-top: 15px;">
            <button class="btn-neon" id="btnBackDetalles" onclick="nav('eleccion')" style="width: 180px; position: static;">
                VOLVER
            </button>
        </div>

        <div id="registroContenedor" style="width: 100%; background: rgba(0,0,0,0.85); padding: 20px 0; display: flex; justify-content: center; align-items: center; gap: 15px; border-top: 1px solid #00ffff;">
            <input type="text" id="nombreHeroe" style="background: #000; border: 1px solid #00ffff; color: white; padding: 10px; font-family: 'Orbitron'; width: 250px;" placeholder="NOMBRE HÉROE..." maxlength="12">
            <button class="btn-neon" id="btnConfirmar">REGISTRAR</button>
        </div>

        <div id="mejorasContenedor" style="display: none; width: 100%; background: rgba(0,0,0,0.85); padding: 20px 0; justify-content: center; align-items: center; gap: 30px; border-top: 1px solid #00ff00;">
    <button class="btn-neon" onclick="prepararCiudad()" style="border-color: #00ff00; color: #00ff00;">SIGUIENTE CIUDAD</button>
    <button class="btn-neon" onclick="nav('tienda')" style="border-color: #ffcc00; color: #ffcc00; box-shadow: 0 0 15px #ffcc00;">TIENDA DE CANJE</button> 
    <button class="btn-neon" onclick="nav('portada')" style="border-color: #ff4400; color: #ff4400;">ABANDONAR</button>
</div>
    </div>

    <div id="estadoHeroe" class="page">
        <button class="btn-neon btn-exit" onclick="nav('portada')">DESCONECTAR</button>
        <h1 id="nombreFinal">NOMBRE</h1>
        <div class="contenedor-principal-equipo">
            <div style="flex: 2; background: rgba(0,0,0,0.7); padding: 25px; border: 1px solid #444; border-radius: 15px;">
                <h3 style="color: #00ffff; text-align: center; margin-top: 0; letter-spacing: 3px; font-size: 1rem;">EQUIPO DE COMBATE</h3>
                <div class="equipo-container">
                    <div class="equipo-slot"><img src="" id="imgArmaFinal" class="equipo-icono"><div style="font-size: 11px; margin-top: 8px;">ESPADA</div></div>
                    <div class="equipo-slot"><img src="" id="imgEscudoFinal" class="equipo-icono"><div style="font-size: 11px; margin-top: 8px;">ESCUDO</div></div>
                    <div class="equipo-slot"><img src="" id="imgPechoFinal" class="equipo-icono"><div style="font-size: 11px; margin-top: 8px;">ARMADURA</div></div>
                </div>
               
            </div>
            <div style="flex: 0.8; background: rgba(0,0,0,0.5); padding: 25px; border: 1px solid #333; border-radius: 15px;">
                <h3 style="color: #00ffff; text-align: center; margin-top: 0; font-size: 1.1rem;">ATRIBUTOS</h3>
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 12px;"><span>FUE:</span><div class="bar-bg"><div id="barFue" class="bar-fill" style="background:#ffaa00; width:0%"></div></div></div>
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 12px;"><span>MAG:</span><div class="bar-bg"><div id="barMag" class="bar-fill" style="background:#ff00ff; width:0%"></div></div></div>
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 12px;"><span>AGI:</span><div class="bar-bg"><div id="barAgi" class="bar-fill" style="background:#00ffff; width:0%"></div></div></div>
            </div>
        </div>
        <button class="btn-neon" id="btnIniciarMision">INICIAR MISIÓN</button>

        function clearIntroTimers() { introTimers.forEach(t => { clearTimeout(t); clearInterval(t); }); introTimers = []; }

        async function escribirLinea(elemento, textoHTML, esPrimera = false) {
            return new Promise(resolve => {
                const esAño = textoHTML.includes("año-resaltado");
                const textoPuro = esAño ? "AÑO 3141" : textoHTML;
                let i = 0; if (!esPrimera) elemento.innerHTML += "<br>";
                const spanLinea = document.createElement("span");
                if (esAño) spanLinea.className = "año-resaltado";
                elemento.appendChild(spanLinea);
                const interval = setInterval(() => {
                    if (i < textoPuro.length) { spanLinea.textContent += textoPuro[i]; i++; } 
                    else { clearInterval(interval); resolve(); }
                }, VELOCIDAD_TIPEADO);
                introTimers.push(interval);
            });
        }

        document.getElementById('btnIniciarMision').onclick = () => {

            const cont = document.getElementById('introTextCont');

            cont.innerHTML = ""; btnCont.style.opacity = "0";
            clearIntroTimers();
            const startTimer = setTimeout(async () => {
                for (let j = 0; j < lineas.length; j++) {
                    await escribirLinea(cont, lineas[j], j === 0);
                    if (j < lineas.length - 1) await new Promise(r => { const wait = setTimeout(r, ESPERA_ENTRE_LINEAS); introTimers.push(wait); });
                }
                btnCont.style.opacity = "1";
            }, 500);
            introTimers.push(startTimer);

            let bancoSeleccionado = bancos[`ciudad${ciudadActual}`] || bancos.ciudad1;

        function siguientePregunta() {
            if(aciertosCount >= ACIERTOS_PARA_GANAR) {
                const superado = document.getElementById('superado-anuncio');
                superado.innerText = "CIUDAD " + ciudadActual + " CONQUISTADA";
                superado.style.display = "block";
                
                setTimeout(() => {
                    superado.style.display = "none";
                    if(ciudadActual < MAX_CIUDADES) {
                        incrementarStats();
                        oroActual += INC_ORO; plataActual += INC_PLATA; bronceActual += INC_BRONCE;
                        ciudadActual++;
                        setDetalles(heroeSeleccionado, true); 
                    } else {
                        alert("¡HAS CONQUISTADO EL MUNDO!");
                        nav('portada');
                    }
                }, 3000);
                return;
            }

            if (preguntasCiudad.length === 0) {
                let bancoSeleccionado = bancos[`ciudad${ciudadActual}`] || bancos.ciudad1;
                preguntasCiudad = [...bancoSeleccionado].sort(() => Math.random() - 0.5);

            const p = preguntasCiudad.pop(); 
            document.getElementById('enunciadoPregunta').innerText = p.q;
            const contenedor = document.getElementById('contenedorOpciones');
            contenedor.innerHTML = "";
            document.getElementById('boxIncognita').classList.remove('acierto-pulso');
            document.getElementById('incognita').innerText = "?";
            document.getElementById('incognita').style.color = "#00ffff";

            p.a.forEach((opcion, i) => {
                const btn = document.createElement('button');
                btn.className = 'btn-neon';
                btn.innerText = opcion;
                btn.onclick = () => verificarRespuesta(btn, i === p.c);
                contenedor.appendChild(btn);
            });
        }

            actualizarBarrasEstado();

        }
