<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MathMaster Pro - El Despertar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Audiowide&family=Orbitron:wght@400;700&family=Rajdhani:wght@300;700&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000; color: white;
            font-family: 'Orbitron', sans-serif;
            touch-action: manipulation;
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 30000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; text-align: center;
        }

        .page {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center; background-repeat: no-repeat;
            display: none; flex-direction: column; align-items: center;
            transition: opacity 0.5s ease;
            overflow-y: auto; box-sizing: border-box;
        }

        .active-page { display: flex; }

        .btn-neon { 
            background: rgba(0, 255, 255, 0.1); border: 2px solid #00ffff; color: #00ffff; 
            padding: 10px 25px; font-size: 14px; text-transform: uppercase; cursor: pointer; 
            border-radius: 5px; box-shadow: 0 0 10px #00ffff; transition: 0.4s; 
            font-family: 'Orbitron', sans-serif; margin: 5px;
        }
        .btn-neon:hover { background: #00ffff; color: #000; }

        .btn-back { position: fixed; top: 10px; left: 10px; z-index: 1000; padding: 5px 15px; font-size: 10px; }

        #portada { background-image: url('portada.jpg'); justify-content: flex-end; padding-bottom: 15vh; }

        /* Contenedores narrativos */
        .intro-text-container {
            font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1.5rem;
            color: white; max-width: 80%; text-shadow: 2px 2px 10px #000;
            margin-top: 20vh; text-align: center;
        }

        /* Tienda y Modales */
        .contenedor-tienda-mascotas {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px; width: 90%; margin: 20px 0; padding-bottom: 100px;
        }
        .celda-mascota {
            background: rgba(0, 255, 255, 0.05); border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 10px; padding: 10px; text-align: center;
        }
        .img-mascota-tienda { width: 60px; height: 60px; object-fit: contain; }

        #modal-detalle {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 20000; justify-content: center; align-items: center;
            overflow-y: auto; padding: 20px;
        }
        .modal-contenido {
            background: #0a0a0a; border: 2px solid #00ffff; border-radius: 15px; 
            width: 90%; max-width: 700px; display: flex; flex-wrap: wrap;
            padding: 30px; position: relative; gap: 20px; justify-content: center;
        }

        /* Gameplay */
        #preguntas { justify-content: center; padding: 20px; }
        .contenedor-pregunta-master {
            display: flex; align-items: center; gap: 20px; 
            background: rgba(0,0,0,0.85); border: 2px solid #00ffff; 
            border-radius: 20px; padding: 20px; width: 95%; max-width: 900px;
        }
        .incognita-container {
            width: 120px; height: 120px; flex-shrink: 0;
            display: flex; justify-content: center; align-items: center;
            border: 2px solid rgba(0, 255, 255, 0.3); border-radius: 50%;
        }
        
        .bar-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin: 4px 0; }
        .bar-fill { height: 100%; width: 0%; transition: width 1s ease; }
    </style>
</head>
<body>

    <audio id="musica" loop><source src="musica_epica.mp3" type="audio/mpeg"></audio>
    <audio id="espada"><source src="choque_espada.mp3" type="audio/mpeg"></audio>

    <div id="overlay">
        <h2 style="color:#00ffff; font-size: 2.5rem; letter-spacing: 8px;">MATHMASTER</h2>
        <p style="font-family: 'Rajdhani'; color: #00ffff;">TOCA PARA INICIAR LA AVENTURA</p>
    </div>

    <div id="portada" class="page">
        <button class="btn-neon" id="btnIniciarTodo">ENTRAR AL MUNDO</button>
    </div>

    <div id="eleccion" class="page" style="background-image: url('eleccion.jpg'); justify-content: center;">
        <h2 style="color: #00ffff; margin-bottom: 30px;">SELECCIONA TU CLASE</h2>
        <div style="display: flex; gap: 30px;">
            <div id="selPaladin" style="width: 160px; height: 300px; border: 2px solid #00ffff; border-radius: 15px; cursor: pointer; background: rgba(0,255,255,0.1); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 10px;">PALADÍN</div>
            <div id="selHechicera" style="width: 160px; height: 300px; border: 2px solid #ff00ff; border-radius: 15px; cursor: pointer; background: rgba(255,0,255,0.1); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 10px;">HECHICERA</div>
        </div>
    </div>

    <div id="detalles" class="page" style="padding-top: 60px;">
        <button class="btn-neon btn-back" onclick="nav('eleccion')">VOLVER</button>
        <h1 id="txtTitulo" style="color: #00ffff;">HÉROE</h1>
        
        <div id="registroContenedor">
            <input type="text" id="nombreHeroe" placeholder="TU NOMBRE..." style="background: #000; border: 1px solid #00ffff; color: white; padding: 12px; width: 200px;">
            <button class="btn-neon" id="btnConfirmarNombre">DESPERTAR</button>
        </div>

        <div id="mejorasContenedor" style="display:none; text-align: center; width: 90%;">
            <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; font-size: 0.9rem;">
                <span style="color: #ffd700;">ORO: <span id="oroVal">0</span></span>
                <span style="color: #c0c0c0;">PLATA: <span id="plataVal">0</span></span>
                <span style="color: #cd7f32;">BRONCE: <span id="bronceVal">0</span></span>
            </div>
            <button class="btn-neon" onclick="prepararCiudad()">SIGUIENTE CIUDAD</button>
            <button class="btn-neon" style="border-color: #ffd700; color: #ffd700;" onclick="nav('tienda')">TIENDA</button>
        </div>
    </div>

    <div id="introduccion" class="page">
        <div class="intro-text-container" id="introTextCont"></div>
        <button class="btn-neon" id="btnEmpezarAventura" style="display:none; margin-top: 20px;">AVANZAR</button>
    </div>

    <div id="ciudad-intro" class="page">
        <h1 id="tituloCiudadLabel" style="color: #00ffff; margin-top: 5vh;"></h1>
        <div class="intro-text-container" id="ciudadTextCont"></div>
        <button class="btn-neon" id="btnIniciarPrueba" style="display:none; margin-top: 20px;">INICIAR PRUEBA</button>
    </div>

    <div id="preguntas" class="page">
        <div class="contenedor-pregunta-master">
            <div class="incognita-container"><div id="incognita" style="font-size: 60px; color: #00ffff;">?</div></div>
            <div style="flex: 1;">
                <div id="enunciadoPregunta" style="font-size: 1.1rem; margin-bottom: 15px; font-family: 'Rajdhani';"></div>
                <div id="contenedorOpciones" style="display: grid; grid-template-columns: 1fr; gap: 10px;"></div>
            </div>
        </div>
    </div>

    <div id="tienda" class="page" style="background: #000; padding-top: 70px;">
        <button class="btn-neon btn-back" onclick="nav('detalles')">VOLVER</button>
        <h1 style="color: #ffd700;">MERCADO DE OBJETOS</h1>
        <div class="contenedor-tienda-mascotas" id="shelfTienda">
            </div>
    </div>

    <div id="modal-detalle">
        <div class="modal-contenido">
            <span style="position: absolute; top: 15px; right: 20px; color: #ff0000; font-size: 1.5rem; cursor: pointer;" onclick="cerrarDetalle()">X</span>
            <img id="modal-img" src="" style="width: 150px; height: 150px; object-fit: contain;">
            <div style="text-align: center; flex: 1; min-width: 250px;">
                <h2 id="modal-nombre" style="color: #ffd700; margin-top: 0;"></h2>
                <p id="modal-desc" style="font-family: 'Rajdhani'; font-size: 1.1rem;"></p>
                <button class="btn-neon">ADQUIRIR</button>
            </div>
        </div>
    </div>

    <script>
        const audioMusica = document.getElementById('musica');
        const audioEspada = document.getElementById('espada');
        
        let heroeNombre = "";
        let ciudadActual = 1;
        let oro = 0, plata = 0, bronce = 0;
        let aciertos = 0;

        const narrativasCiudades = {
            1: "Has llegado a la Ciudad de los Ángulos. Los antiguos pilares se sostienen por cálculos precisos de Euclides. Si fallas, la arquitectura colapsará sobre ti.",
            2: "La Ciudad de los Triángulos aparece tras la niebla. Aquí, las líneas de Simson dividen la realidad. Solo quien domine el área y el perímetro podrá cruzar.",
            3: "Te encuentras ante las murallas de la Ciudad Paralela. El aire vibra con la energía de rectas que jamás se tocan. Los ángulos alternos internos son la clave.",
            4: "La Ciudad de los Polígonos es el último bastión. Figuras de infinitos lados protegen el conocimiento final del Gran Geómetra Euler."
        };

        const bancos = {
            1: [
                { q: "¿Quién es considerado el padre de la geometría?", a: ["Euclides", "Pitágoras", "Tales", "Euler"], c: 0 },
                { q: "¿Qué elemento no tiene dimensiones?", a: ["El punto", "La recta", "El plano", "El cubo"], c: 0 },
                { q: "¿Cómo se llaman las rectas que nunca se cruzan?", a: ["Secantes", "Paralelas", "Perpendiculares", "Oblicuas"], c: 1 },
                { q: "¿Qué instrumento se usa para medir ángulos?", a: ["Compás", "Transportador", "Escuadra", "Regla"], c: 1 }
            ],
            2: [
                { q: "¿Cómo se llama el triángulo con un ángulo mayor a 90°?", a: ["Acutángulo", "Rectángulo", "Obtusángulo", "Isósceles"], c: 2 },
                { q: "¿Cuánto suma la medida de los ángulos internos de un triángulo?", a: ["90°", "180°", "360°", "270°"], c: 1 },
                { q: "¿Triángulo que tiene sus tres lados iguales?", a: ["Escaleno", "Isósceles", "Equilátero", "Obtusángulo"], c: 2 },
                { q: "¿Línea que divide un ángulo en dos partes iguales?", a: ["Mediana", "Bisectriz", "Altura", "Mediatriz"], c: 1 }
            ],
            3: [
                { q: "Si dos rectas paralelas son cortadas por una secante, ¿cómo son los ángulos alternos internos?", a: ["Suman 180°", "Diferentes", "Iguales", "Suman 90°"], c: 2 },
                { q: "¿Cómo se llaman los ángulos que están uno al lado del otro y suman 180°?", a: ["Complementarios", "Suplementarios", "Opuestos", "Rectos"], c: 1 }
            ],
            4: [
                { q: "¿Cómo se llama el polígono de 5 lados?", a: ["Hexágono", "Heptágono", "Pentágono", "Octágono"], c: 2 },
                { q: "¿Cuál es la suma de los ángulos exteriores de cualquier polígono?", a: ["180°", "360°", "540°", "720°"], c: 1 }
            ]
        };

        const tiendaItems = [
            { n: "LOBO DE CAZA", d: "Aumenta tu agilidad en un 15%", p: 50, img: "mascota_1.png" },
            { n: "BÚHO SABIO", d: "Revela pistas en las preguntas difíciles", p: 75, img: "mascota_2.png" },
            { n: "ESPADA DE EULER", d: "Corta la ignorancia con precisión", p: 100, img: "arma_1.png" },
            { n: "TÚNICA MÍSTICA", d: "Protección contra errores fatales", p: 60, img: "traje_1.png" }
        ];

        // Lógica de Inicio
        document.getElementById('overlay').onclick = () => {
            document.getElementById('overlay').style.display = 'none';
            nav('portada');
            audioMusica.play().catch(() => {});
        };

        document.getElementById('btnIniciarTodo').onclick = () => {
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            nav('eleccion');
            sfx();
        };

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
        }

        function sfx() { audioEspada.currentTime = 0; audioEspada.play(); }

        document.getElementById('selPaladin').onclick = () => { heroeNombre = "PALADÍN"; abrirDetalles(); };
        document.getElementById('selHechicera').onclick = () => { heroeNombre = "HECHICERA"; abrirDetalles(); };

        function abrirDetalles() {
            document.getElementById('txtTitulo').innerText = heroeNombre;
            nav('detalles');
            sfx();
        }

        document.getElementById('btnConfirmarNombre').onclick = () => {
            const n = document.getElementById('nombreHeroe').value;
            if(!n) return;
            document.getElementById('registroContenedor').style.display = 'none';
            document.getElementById('mejorasContenedor').style.display = 'block';
            oro = 0; plata = 0; bronce = 0;
            actualizarMonedas();
            lanzarIntroGeneral();
        };

        function actualizarMonedas() {
            document.getElementById('oroVal').innerText = oro;
            document.getElementById('plataVal').innerText = plata;
            document.getElementById('bronceVal').innerText = bronce;
        }

        function lanzarIntroGeneral() {
            nav('introduccion');
            escribirTexto("introTextCont", "Año 3141. El mundo ha olvidado las leyes de la geometría. Tú has sido elegido para restaurar el equilibrio a través de las 4 ciudades sagradas...", () => {
                document.getElementById('btnEmpezarAventura').style.display = 'block';
            });
        }

        document.getElementById('btnEmpezarAventura').onclick = () => prepararCiudad();

        function prepararCiudad() {
            if(ciudadActual > 4) { alert("¡Has salvado el mundo!"); return; }
            nav('ciudad-intro');
            document.getElementById('tituloCiudadLabel').innerText = "CIUDAD " + ciudadActual;
            document.getElementById('btnIniciarPrueba').style.display = 'none';
            escribirTexto("ciudadTextCont", narrativasCiudades[ciudadActual], () => {
                document.getElementById('btnIniciarPrueba').style.display = 'block';
            });
        }

        document.getElementById('btnIniciarPrueba').onclick = () => { aciertos = 0; iniciarQuiz(); };

        function iniciarQuiz() {
            nav('preguntas');
            const lista = bancos[ciudadActual];
            if(aciertos >= lista.length) {
                oro += 75; 
                plata += 50;
                bronce += 25;
                ciudadActual++;
                actualizarMonedas();
                nav('detalles');
                return;
            }
            const p = lista[aciertos];
            document.getElementById('enunciadoPregunta').innerText = p.q;
            const cont = document.getElementById('contenedorOpciones');
            cont.innerHTML = "";
            p.a.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = 'btn-neon';
                b.innerText = opt;
                b.onclick = () => {
                    if(i === p.c) { aciertos++; sfx(); iniciarQuiz(); }
                    else { alert("¡Respuesta incorrecta!"); nav('detalles'); }
                };
                cont.appendChild(b);
            });
        }

        function escribirTexto(id, texto, callback) {
            const el = document.getElementById(id);
            el.innerText = "";
            let i = 0;
            const timer = setInterval(() => {
                el.innerText += texto[i];
                i++;
                if(i >= texto.length) { clearInterval(timer); callback(); }
            }, 40);
        }

        // Tienda
        function cargarTienda() {
            const shelf = document.getElementById('shelfTienda');
            shelf.innerHTML = "";
            tiendaItems.forEach(item => {
                shelf.innerHTML += `
                    <div class="celda-mascota" onclick="verDetalle('${item.img}', '${item.n}', '${item.d}')">
                        <img src="${item.img}" class="img-mascota-tienda">
                        <p style="font-size:0.7rem;">${item.n}</p>
                        <button class="btn-neon" style="font-size:10px;">${item.p} ORO</button>
                    </div>`;
            });
        }
        cargarTienda();

        function verDetalle(img, nombre, desc) {
            document.getElementById('modal-img').src = img;
            document.getElementById('modal-nombre').innerText = nombre;
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('modal-detalle').style.display = 'flex';
            sfx();
        }

        function cerrarDetalle() { document.getElementById('modal-detalle').style.display = 'none'; }
    </script>
</body>
</html>
